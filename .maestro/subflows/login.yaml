appId: com.ordrctrl.app
---
# Subflow: login.yaml — authenticate without clearing state
# Intended to be called via runFlow from flows that require auth.
# Does NOT call clearState — caller controls app/session state.

- tapOn:
    text: "Email"
- inputText: ${output.testUser.email}

- tapOn:
    text: "Password"
- inputText: ${output.testUser.password}

- tapOn:
    text: "Sign In"

- waitForAnimationToEnd
- assertVisible:
    text: "ordrctrl"
