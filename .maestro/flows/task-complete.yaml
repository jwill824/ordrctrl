appId: com.ordrctrl.app
---
# Flow 3: task-complete.yaml — complete a task and verify it moves to Completed section
# FR-012 | maestro-flows-contract.md Flow 3

# Start fresh and authenticate
- clearState
- launchApp
- runFlow: subflows/login.yaml

# Tap the first visible task's complete checkbox
# Capacitor WebView exposes aria-label as accessibility ID on iOS and Android
- tapOn:
    id: "mark-complete"

# Wait for state update animation
- waitForAnimationToEnd

# Verify Completed section appears
- assertVisible:
    text: "Completed"
