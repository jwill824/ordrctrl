appId: com.ordrctrl.app

onFlowStart:
  - runScript: ../scripts/setup.js

onFlowComplete:
  - runScript: ../scripts/teardown.js
---
# Main app E2E flow: sign in → verify feed → complete a task
# Covers FR-010 (unauthenticated guard), FR-011 (feed load), FR-012 (task completion)
#
# onFlowStart creates a fresh test user with a seeded task (output.testUser).
# onFlowComplete always runs — deletes the test user even if the flow fails.

# Start with a clean slate
- clearState
- launchApp

# FR-010: verify unauthenticated users see the login screen
- assertVisible:
    text: "Sign In"
- assertVisible:
    text: "Email"

# FR-011: authenticate and verify feed loads
- runFlow: ../subflows/login.yaml

# Wait for the seeded task to appear in the feed (confirms login + feed load)
- extendedWaitUntil:
    visible:
      text: "Mark complete"
    timeout: 30000

# FR-012: mark the first task complete
- waitForAnimationToEnd
- tapOn:
    text: "Mark complete"
- waitForAnimationToEnd
- extendedWaitUntil:
    notVisible:
      text: "Mark complete"
    timeout: 20000
