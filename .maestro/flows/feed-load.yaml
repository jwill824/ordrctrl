appId: com.ordrctrl.app
---
# Flow 2: feed-load.yaml — verify feed loads with tasks after authentication
# FR-011 | maestro-flows-contract.md Flow 2
# Assumes authenticated session established by auth.yaml

# Launch app (session persists from auth.yaml)
- launchApp

# Verify feed header is visible
- assertVisible:
    text: "ordrctrl"

# Verify at least one section is present (optional flags prevent failure when section absent)
- waitForAnimationToEnd
- assertVisible:
    text: "UPCOMING"
    optional: true
- assertVisible:
    text: "NO DATE"
    optional: true
