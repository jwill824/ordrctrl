appId: com.ordrctrl.app
---
# Flow 1: auth.yaml — launch app, verify login screen, authenticate, verify feed loads
# FR-010, FR-011 | maestro-flows-contract.md Flow 1

# Step 1: Launch fresh (clear any existing session)
- clearState
- launchApp

# Step 2: Verify login screen shown when unauthenticated (FR-010)
- assertVisible:
    text: "Sign In"
- assertVisible:
    text: "Email"

# Step 3: Authenticate with test credentials (FR-011)
- tapOn:
    text: "Email"
- inputText: ${output.testUser.email}

- tapOn:
    text: "Password"
- inputText: ${output.testUser.password}

- tapOn:
    text: "Sign In"

# Step 4: Verify feed loads after successful auth (FR-011)
- waitForAnimationToEnd
- assertVisible:
    text: "ordrctrl"
