appId: com.ordrctrl.app
---
# E2E suite orchestrator — runs all flows in order with a shared test user.
# output.testUser is set by setup.js and is available to all runFlow sub-flows.
#
# Usage:  maestro test .maestro/e2e-suite.yaml
#
# Requires:
#   - Backend running with ENABLE_TEST_ROUTES=true
#   - App installed on simulator/emulator

# Step 1: Create a fresh test user
- runScript: scripts/setup.js

# Step 2: Auth flow — verifies sign-in works
- runFlow: flows/auth.yaml

# Step 3: Feed load — verifies tasks appear after auth
- runFlow: flows/feed-load.yaml

# Step 4: Task complete — verifies task can be marked done
- runFlow: flows/task-complete.yaml

# Step 5: Teardown — delete the test user
- runScript: scripts/teardown.js
