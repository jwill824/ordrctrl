appId: com.ordrctrl.app
---
# E2E suite orchestrator — runs all flows in order with a shared test user.
# output.testUser is set by setup.js and is available to all runFlow sub-flows.
#
# Usage:  maestro test .maestro/e2e-suite.yaml
#
# Requires:
#   - Backend running with ENABLE_TEST_ROUTES=true
#   - App installed on simulator/emulator
#   - .maestro/.env.local with APPLE_TEST_EMAIL and APPLE_TEST_PASSWORD

# Step 1: Create a fresh test user with a seeded task
- runScript: scripts/setup.js

# Step 2: Main app flow — sign in, verify feed, complete a task
- runFlow: flows/app-flow.yaml

# Step 3: Integrations — connect Apple Calendar, verify connected
- runFlow: flows/integrations.yaml

# Step 4: Teardown — delete the test user (also runs via shell-level cleanup)
- runScript: scripts/teardown.js
